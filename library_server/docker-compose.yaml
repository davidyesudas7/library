services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: library
      POSTGRES_PASSWORD: "CH3Z-nPO3bkxWwdXrYvQ_-_dw54Gk_cy"
    volumes:
      - library_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "ioyvRFgyInysxTd30ZJ1OFuLwUwUsp3C"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: library_test
      POSTGRES_PASSWORD: "BRTQdyGRS1tf8PcDe8poSxjSk4AwNWPg"
    volumes:
      - library_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "E6nLiGifYKvzXGwXWQAqAhOY-6vRLzzb"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  library_data:
  library_test_data:
